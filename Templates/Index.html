<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto Familiar - David Rivera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border">
            <h1 class="text-2xl font-bold text-slate-800">Control Financiero</h1>
            <div class="flex items-center gap-2">
                <span class="text-xl font-bold">₡</span>
                <input type="number" id="ingresoMensual" value="1000000" onchange="actualizarTodo()" class="text-2xl font-bold text-blue-600 outline-none w-40 border-b-2 border-blue-200">
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-md border">
                    <h2 class="text-sm font-bold text-blue-600 uppercase mb-4">Ingresar Movimiento</h2>
                    <input type="text" id="detalle" placeholder="Detalle (Ej: Alquiler o Helado)" class="w-full p-3 mb-2 bg-slate-50 rounded-xl border">
                    <input type="number" id="monto" placeholder="Monto (₡)" class="w-full p-3 mb-4 bg-slate-50 rounded-xl border">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="agregarGasto('fijo')" class="bg-blue-600 text-white font-bold py-3 rounded-xl text-sm">Gasto Fijo</button>
                        <button onclick="agregarGasto('variable')" class="bg-orange-600 text-white font-bold py-3 rounded-xl text-sm">Gasto Corriente</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-slate-800 p-4 rounded-2xl text-white text-center">
                        <p class="text-[10px] uppercase opacity-60">Saldo Disponible</p>
                        <p id="resumenSaldo" class="text-xl font-bold text-emerald-400">₡0</p>
                    </div>
                    <div class="bg-blue-100 p-4 rounded-2xl text-center">
                        <p class="text-[10px] uppercase text-blue-600 font-bold">Fijos</p>
                        <p id="resumenFijos" class="text-xl font-bold text-blue-800">₡0</p>
                    </div>
                    <div class="bg-orange-100 p-4 rounded-2xl text-center">
                        <p class="text-[10px] uppercase text-orange-600 font-bold">Corrientes</p>
                        <p id="resumenVar" class="text-xl font-bold text-orange-800">₡0</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h3 class="font-bold text-slate-700 mb-4">Historial de Gastos</h3>
                    <div id="listaGeneral" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function agregarGasto(tipo) {
            const det = document.getElementById('detalle').value;
            const mon = document.getElementById('monto').value;
            if (!det || !mon) return;

            await fetch('/api/movimientos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tipo, detalle: det, monto: mon, icon: tipo === 'fijo' ? 'lock' : 'shopping-cart' })
            });

            document.getElementById('detalle').value = '';
            document.getElementById('monto').value = '';
            actualizarTodo();
        }

        async function eliminar(id) {
            await fetch(`/api/movimientos/${id}`, { method: 'DELETE' });
            actualizarTodo();
        }

        async function actualizarTodo() {
            const resp = await fetch('/api/movimientos');
            const movs = await resp.json();
            const ingreso = parseFloat(document.getElementById('ingresoMensual').value) || 0;
            const lista = document.getElementById('listaGeneral');
            
            let tf = 0, tv = 0;
            lista.innerHTML = '';

            movs.forEach(m => {
                if(m.tipo === 'fijo') tf += m.monto; else tv += m.monto;
                lista.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border-l-4 ${m.tipo === 'fijo' ? 'border-blue-500' : 'border-orange-500'}">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-${m.icon} text-slate-400"></i>
                            <span class="text-sm font-medium">${m.detalle}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold text-sm">₡${m.monto.toLocaleString()}</span>
                            <button onclick="eliminar(${m.id})" class="text-red-400">×</button>
                        </div>
                    </div>`;
            });

            document.getElementById('resumenFijos').innerText = '₡' + tf.toLocaleString();
            document.getElementById('resumenVar').innerText = '₡' + tv.toLocaleString();
            document.getElementById('resumenSaldo').innerText = '₡' + (ingreso - tf - tv).toLocaleString();
        }
        actualizarTodo();
    </script>
</body>
</html>
